<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휴가신청서</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: '맑은 고딕', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #dde3ea;
    display: flex;
    justify-content: center;
    padding: 60px 16px 40px 16px;
    min-height: 100vh;
  }

  /* ── 툴바: 우상단 고정 ── */
  .toolbar {
    position: fixed;
    top: 14px;
    right: 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 100;
  }
  .btn-print {
    padding: 8px 20px;
    background: #2c3e50;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .btn-print:hover { background: #3a5068; }
  .btn-reset {
    padding: 8px 16px;
    background: #6b7684;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .btn-reset:hover { background: #505a66; }
  .save-notice {
    font-size: 11px;
    color: #fff;
    background: rgba(0,0,0,0.28);
    padding: 5px 11px;
    border-radius: 4px;
  }

  /* ── A4 페이지 ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    background: white;
    padding: 30mm 18mm 16mm 18mm;
    box-shadow: 0 6px 30px rgba(0,0,0,0.16);
    position: relative;
  }

  /* ① 제목 */
  .title-wrap {
    text-align: center;
    margin-bottom: 64px;
  }
  .title {
    font-size: 23pt;
    font-weight: 700;
    letter-spacing: 18px;
    text-indent: 18px;
    color: #1a1a1a;
  }

  /* ② 결재란 */
  .approval-wrap {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 48px;
  }
  .approval-table {
    border-collapse: collapse;
    font-size: 8.5pt;
  }
  .approval-table td {
    border: 1px solid #b0b8c4;
    text-align: center;
  }
  .approval-table .a-head {
    font-weight: 600;
    background: #e8f0fa;
    padding: 3px 10px;
    letter-spacing: 2px;
    font-size: 8.5pt;
    color: #2c3e50;
  }
  .approval-table .a-label {
    font-weight: 600;
    background: #e8f0fa;
    padding: 5px 0;
    font-size: 8.5pt;
    color: #2c3e50;
    white-space: nowrap;
    width: 72px;
  }
  .approval-table .a-stamp {
    height: 58px;
    width: 72px;
    vertical-align: top;
    padding: 4px;
  }

  /* ③ 제출 문구 */
  .submit-line-wrap {
    margin-bottom: 16px;
  }
  .submit-line {
    font-size: 11pt;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.3px;
  }

  /* ④ 날짜 */
  .submit-date-wrap {
    text-align: right;
    margin-bottom: 40px;
  }
  .submit-date {
    font-size: 10.5pt;
    color: #333;
    letter-spacing: 1.5px;
  }

  /* ── 메인 테이블 ── */
  .form-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 10pt;
    table-layout: fixed;   /* 칸 너비 고정 → 반차 켜져도 칸 안 틀어짐 */
  }
  .form-table td {
    border: 1px solid #b0b8c4;
    vertical-align: middle;
  }
  .lh {
    background: #e8f0fa;
    text-align: center;
    font-weight: 600;
    padding: 0 5px;
    width: 54px;
    white-space: nowrap;
    letter-spacing: 1px;
    font-size: 9.5pt;
    line-height: 2.2;
    color: #2c3e50;
  }
  .cl {
    background: #e8f0fa;
    text-align: center;
    font-weight: 600;
    padding: 16px 6px;
    width: 76px;
    white-space: nowrap;
    letter-spacing: 1.5px;
    font-size: 9.5pt;
    color: #2c3e50;
  }
  .cv {
    padding: 14px 16px;
  }

  /* ── 신청자 한 줄 (성명 / 소속 / 직위) ── */
  .info-row-inner {
    display: flex;
    align-items: stretch;
    min-height: 52px;
  }
  .info-third {
    display: flex;
    align-items: center;
    flex: 1;
  }
  .info-third + .info-third {
    border-left: 1px solid #b0b8c4;
  }
  .cl-in {
    background: #e8f0fa;
    text-align: center;
    font-weight: 600;
    padding: 16px 6px;
    white-space: nowrap;
    font-size: 9.5pt;
    color: #2c3e50;
    border-right: 1px solid #b0b8c4;
    flex-shrink: 0;
    width: 76px;
    letter-spacing: 1px;
  }
  .cv-in {
    padding: 14px 16px;
    flex: 1;
    min-width: 0;
    text-align: center;
  }

  /* 입력 요소 공통 */
  .form-table input[type="text"],
  .form-table input[type="tel"],
  .form-table textarea,
  .form-table select {
    width: 100%;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 10pt;
    background: transparent;
    padding: 1px 2px;
    color: #1a1a1a;
    text-align: center;
  }
  .form-table textarea {
    resize: none;
    line-height: 1.7;
    text-align: center;
    display: block;
  }
  .reason-cell {
    padding: 0;
    vertical-align: middle;
  }
  .reason-cell textarea {
    width: 100%;
    padding: 42px 16px 8px;
    text-align: center;
  }
  .form-table select { cursor: pointer; }

  /* ── 구분 영역 ── */
  .gubun-outer {
    padding: 14px 16px;
  }
  .gubun-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    align-items: center;
  }
  .gubun-row .gubun-item {
    display: inline-flex;
    align-items: center;
    font-size: 10pt;
    white-space: nowrap;
    color: #1a1a1a;
  }
  .days-badge {
    font-size: 9.5pt;
    color: #1a5fa8;
    font-weight: 700;
    min-width: 14px;
    display: inline-block;
    text-align: center;
  }

  /* ── 기간 ── */
  .period-list { display: flex; flex-direction: column; gap: 8px; }
  .period-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .form-table .period-row select.period-type {
    width: auto;
    min-width: 86px;
    padding: 4px 6px;
    border: 1px solid #b0b8c4;
    border-radius: 4px;
    background: #f7faff;
    color: #1a1a1a;
    font-size: 9.5pt;
    text-align: left;
    flex-shrink: 0;
  }
  .form-table .period-row select.bancha-time {
    width: auto;
    min-width: 56px;
    padding: 4px 6px;
    border: 1px solid #d6b76e;
    border-radius: 4px;
    background: #fff8e1;
    color: #6b4f00;
    font-size: 9.5pt;
    text-align: left;
    flex-shrink: 0;
  }
  .date-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    border-bottom: 1px solid #b0b8c4;
    position: relative;            /* 숨긴 date input 앵커 */
  }
  .form-table .date-input-wrap input[type="text"] {
    font-family: inherit;
    font-size: 10pt;
    border: none;
    outline: none;
    background: transparent;
    padding: 2px 4px;
    width: 90px;
    color: #1a1a1a;
    text-align: center;
  }
  /* 숨긴 date input을 달력 아이콘 위치에 투명하게 겹쳐서
     showPicker()가 그 자리에서 펼쳐지도록 함 */
  .date-input-wrap input[type="date"] {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 24px;
    height: 24px;
    opacity: 0;
    pointer-events: none;
    border: none;
    padding: 0;
    margin: 0;
  }
  .cal-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 2px;
    color: #2c3e50;
    line-height: 1;
    position: relative;
    z-index: 2;
  }
  .cal-btn:hover { opacity: 0.7; }
  .period-sep { font-size: 12pt; color: #555; }
  .period-days {
    font-size: 9.5pt;
    color: #1a5fa8;
    font-weight: 700;
    white-space: nowrap;
    min-width: 40px;
    flex-shrink: 0;
  }
  .remove-period-btn {
    background: none;
    border: none;
    color: #b8a99c;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .remove-period-btn:hover { color: #c0392b; }
  .add-period-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px dashed #8995a4;
    color: #2c3e50;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 9.5pt;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .add-period-btn:hover {
    background: #eef3fa;
    border-color: #2c3e50;
  }

  /* ── 성명 셀 ── */
  .name-cell {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .name-cell input { flex: 1; }
  .name-in { font-size: 10pt; white-space: nowrap; color: #555; }

  /* ── 첨부 ── */
  .attach-line {
    margin-top: 18px;
    font-size: 9pt;
    padding-left: 2px;
    color: #777;
    letter-spacing: 0.3px;
  }

  /* ── 인쇄 ── */
  @media print {
    @page { size: A4; margin: 0; }
    body { background: white; padding: 0; display: block; }
    .toolbar { display: none !important; }
    .page { width: 100%; min-height: auto; padding: 32mm 15mm 12mm 15mm; box-shadow: none; }

    input[type="date"] { border-bottom-color: transparent !important; display: none !important; }
    textarea, input[type="text"], input[type="tel"] {
      border-bottom-color: transparent !important;
    }
    .add-period-btn, .remove-period-btn, .cal-btn { display: none !important; }

    .form-table .period-row select.period-type,
    .form-table .period-row select.bancha-time {
      border: none !important;
      background: transparent !important;
      -webkit-appearance: none;
      appearance: none;
      padding: 2px 4px;
    }

    .form-table, .form-table td,
    .approval-table, .approval-table td {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .lh, .cl, .cl-in, .approval-table .a-head, .approval-table .a-label {
      background: #e8f0fa !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

<!-- 툴바: 우상단 고정 -->
<div class="toolbar">
  <span class="save-notice">💾 이름 · 팀 · 직위 · 연락처 자동 저장</span>
  <button class="btn-reset" onclick="resetForm()">양식 초기화</button>
  <button class="btn-print" onclick="doPrint()">🖨️ 인쇄</button>
</div>

<!-- A4 페이지 -->
<div class="page">

  <!-- ① 제목 -->
  <div class="title-wrap">
    <span class="title">휴 가 신 청 서</span>
  </div>

  <!-- ② 결재란 -->
  <div class="approval-wrap">
    <table class="approval-table">
      <tr>
        <td class="a-head" rowspan="2"
            style="writing-mode:vertical-rl; letter-spacing:5px; padding:8px 5px;">결&nbsp;&nbsp;재</td>
        <td class="a-label">팀 장</td>
        <td class="a-label">총괄이사</td>
      </tr>
      <tr>
        <td class="a-stamp"></td>
        <td class="a-stamp"></td>
      </tr>
    </table>
  </div>

  <!-- ③ 제출 문구 -->
  <div class="submit-line-wrap">
    <p class="submit-line">아래와 같이 휴가신청서를 제출합니다.</p>
  </div>

  <!-- ④ 날짜 -->
  <div class="submit-date-wrap">
    <span class="submit-date" id="displayDate"></span>
  </div>

  <!-- ⑤ 메인 테이블 -->
  <table class="form-table">
    <colgroup>
      <col style="width: 54px;">
      <col style="width: 76px;">
      <col>
    </colgroup>

    <!-- 성명 / 소속(팀) / 직위 — 한 줄 -->
    <tr>
      <td class="lh">휴가<br>신청자</td>
      <td colspan="2" style="padding:0;">
        <div class="info-row-inner">

          <!-- 성명 -->
          <div class="info-third">
            <span class="cl-in">성&nbsp;&nbsp;&nbsp;명</span>
            <div class="cv-in">
              <div class="name-cell">
                <input type="text" id="empName" placeholder="이름 입력" oninput="savePerson()" />
                <span class="name-in">(인)</span>
              </div>
            </div>
          </div>

          <!-- 소속 -->
          <div class="info-third">
            <span class="cl-in">소&nbsp;&nbsp;&nbsp;속</span>
            <div class="cv-in">
              <select id="empTeam" onchange="savePerson()">
                <option value="">팀 선택</option>
                <option value="1팀">1팀</option>
                <option value="2팀">2팀</option>
              </select>
            </div>
          </div>

          <!-- 직위 -->
          <div class="info-third">
            <span class="cl-in">직&nbsp;&nbsp;&nbsp;위</span>
            <div class="cv-in">
              <select id="empRank" onchange="savePerson()">
                <option value="">직위 선택</option>
                <option value="주임">주임</option>
                <option value="대리">대리</option>
                <option value="과장">과장</option>
                <option value="차장">차장</option>
                <option value="부장">부장</option>
              </select>
            </div>
          </div>

        </div>
      </td>
    </tr>

    <!-- 구분 -->
    <tr>
      <td class="lh" rowspan="3">휴&nbsp;가<br>내&nbsp;용</td>
      <td class="cl">구&nbsp;&nbsp;&nbsp;&nbsp;분</td>
      <td style="padding:0;">
        <div class="gubun-outer">
          <div class="gubun-row">
            <span class="gubun-item">휴가&nbsp;(<span class="days-badge" id="d-휴가"></span>)</span>
            <span class="gubun-item">반차&nbsp;(<span class="days-badge" id="d-반차"></span>)</span>
            <span class="gubun-item">병가&nbsp;(<span class="days-badge" id="d-병가"></span>)</span>
            <span class="gubun-item">출산휴가&nbsp;(<span class="days-badge" id="d-출산휴가"></span>)</span>
            <span class="gubun-item">장기특별휴가&nbsp;(<span class="days-badge" id="d-장기특별휴가"></span>)</span>
            <span class="gubun-item">기타&nbsp;(<span class="days-badge" id="d-기타"></span>)</span>
          </div>
        </div>
      </td>
    </tr>

    <!-- 사유 -->
    <tr>
      <td class="cl">사&nbsp;&nbsp;&nbsp;&nbsp;유</td>
      <td class="reason-cell">
        <textarea id="reason" rows="3">개인사정</textarea>
      </td>
    </tr>

    <!-- 기간 -->
    <tr>
      <td class="cl">기&nbsp;&nbsp;&nbsp;&nbsp;간</td>
      <td class="cv">
        <div id="periodList" class="period-list">
          <!-- 기간 row 템플릿이 JS에서 추가됩니다 -->
        </div>
        <button type="button" class="add-period-btn" onclick="addPeriod()">+ 기간 추가</button>
      </td>
    </tr>

    <!-- 긴급연락처 -->
    <tr>
      <td class="cl" colspan="2"
          style="text-align:center; letter-spacing:1px; font-weight:600; background:#e8f0fa; color:#2c3e50;">
        긴 급 연 락 처
      </td>
      <td class="cv" style="text-align:center;">
        <input type="tel" id="emergency" placeholder="010-0000-0000" oninput="formatPhone(this); saveEmergency()" style="text-align:center;" />
      </td>
    </tr>

  </table>

  <p class="attach-line">※ 첨부 : 관련 증빙 자료</p>

</div>

<!-- 기간 row 템플릿 -->
<template id="periodRowTemplate">
  <div class="period-row">
    <select class="period-type" onchange="onPeriodTypeChange(this); calcDays()">
      <option value="휴가">휴가</option>
      <option value="반차">반차</option>
      <option value="병가">병가</option>
      <option value="출산휴가">출산휴가</option>
      <option value="장기특별휴가">장기특별휴가</option>
      <option value="기타">기타</option>
    </select>
    <div class="date-input-wrap">
      <input type="text" class="start-date" placeholder="YYYY-MM-DD" maxlength="10"
        oninput="formatDate(this); calcDays()" />
      <input type="date" class="start-picker" onchange="syncFromPicker(this)" />
      <button class="cal-btn" type="button" onclick="openPicker(this)">📅</button>
    </div>
    <span class="period-sep">~</span>
    <div class="date-input-wrap">
      <input type="text" class="end-date" placeholder="YYYY-MM-DD" maxlength="10"
        oninput="formatDate(this); calcDays()" />
      <input type="date" class="end-picker" onchange="syncFromPicker(this)" />
      <button class="cal-btn" type="button" onclick="openPicker(this)">📅</button>
    </div>
    <span class="period-days"></span>
    <button type="button" class="remove-period-btn" onclick="removePeriod(this)" title="이 기간 제거">✕</button>
    <select class="bancha-time" style="display:none;">
      <option value="오전">오전</option>
      <option value="오후">오후</option>
    </select>
  </div>
</template>

<script>
  function doPrint() {
    const orig = document.title;
    document.title = '';
    window.print();
    setTimeout(() => { document.title = orig; }, 500);
  }

  function formatKorDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}년  ${m}월  ${day}일`;
  }
  document.getElementById('displayDate').textContent = formatKorDate(new Date());

  function savePerson() {
    localStorage.setItem('hv_name',  document.getElementById('empName').value);
    localStorage.setItem('hv_team',  document.getElementById('empTeam').value);
    localStorage.setItem('hv_rank',  document.getElementById('empRank').value);
  }
  function formatDate(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 8) v = v.slice(0, 8);
    if (v.length > 6)      input.value = v.slice(0,4) + '-' + v.slice(4,6) + '-' + v.slice(6);
    else if (v.length > 4) input.value = v.slice(0,4) + '-' + v.slice(4);
    else                   input.value = v;
  }
  function syncFromPicker(picker) {
    const row = picker.closest('.period-row');
    const isStart = picker.classList.contains('start-picker');
    const txt = isStart ? row.querySelector('.start-date') : row.querySelector('.end-date');
    if (picker.value) txt.value = picker.value;
    calcDays();
  }
  function openPicker(btn) {
    const picker = btn.parentElement.querySelector('input[type="date"]');
    if (picker.showPicker) picker.showPicker();
    else picker.focus();
  }

  function formatPhone(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length <= 3) {
      input.value = v;
    } else if (v.length <= 7) {
      input.value = v.slice(0,3) + '-' + v.slice(3);
    } else {
      input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
    }
  }
  function saveEmergency() {
    localStorage.setItem('hv_emergency', document.getElementById('emergency').value);
  }
  function loadSaved() {
    const name  = localStorage.getItem('hv_name')      || '';
    const team  = localStorage.getItem('hv_team')      || '';
    const rank  = localStorage.getItem('hv_rank')      || '';
    const emerg = localStorage.getItem('hv_emergency') || '';
    if (name)  document.getElementById('empName').value    = name;
    if (team)  document.getElementById('empTeam').value    = team;
    if (rank)  document.getElementById('empRank').value    = rank;
    if (emerg) document.getElementById('emergency').value  = emerg;
  }

  /* ── 기간 row 관리 ── */
  function addPeriod() {
    const tpl = document.getElementById('periodRowTemplate');
    const node = tpl.content.firstElementChild.cloneNode(true);
    document.getElementById('periodList').appendChild(node);
    calcDays();
  }
  function removePeriod(btn) {
    const rows = document.querySelectorAll('.period-row');
    const row = btn.closest('.period-row');
    if (rows.length <= 1) {
      // 마지막 한 줄은 지우지 않고 입력값만 비움
      row.querySelector('.period-type').value = '휴가';
      row.querySelector('.bancha-time').style.display = 'none';
      row.querySelector('.bancha-time').value = '오전';
      row.querySelector('.start-date').value = '';
      row.querySelector('.end-date').value = '';
      const sp = row.querySelector('.start-picker');
      const ep = row.querySelector('.end-picker');
      if (sp) sp.value = '';
      if (ep) ep.value = '';
    } else {
      row.remove();
    }
    calcDays();
  }
  function onPeriodTypeChange(sel) {
    const row = sel.closest('.period-row');
    const bancha = row.querySelector('.bancha-time');
    if (sel.value === '반차') {
      bancha.style.display = '';
    } else {
      bancha.style.display = 'none';
    }
  }

  /* 모든 기간 row를 합산해 구분 배지 업데이트 */
  function calcDays() {
    // 모든 type 합계 0으로 초기화
    const totals = { '휴가':0, '반차':0, '병가':0, '출산휴가':0, '장기특별휴가':0, '기타':0 };

    const rows = document.querySelectorAll('.period-row');
    rows.forEach(r => {
      const s = r.querySelector('.start-date').value;
      const e = r.querySelector('.end-date').value;
      const type = r.querySelector('.period-type').value;
      const out = r.querySelector('.period-days');

      // 반차는 1줄당 0.5일 (날짜 무관)
      if (type === '반차') {
        if (s.length === 10) {
          out.textContent = '(0.5일)';
          totals['반차'] += 0.5;
        } else {
          out.textContent = '';
        }
        return;
      }

      // 그 외: 시작/종료일 모두 입력되어야 계산
      if (s.length < 10 || e.length < 10) { out.textContent = ''; return; }
      const start = new Date(s);
      const end   = new Date(e);
      if (isNaN(start) || isNaN(end) || end < start) { out.textContent = ''; return; }

      const rawDays = Math.round((end - start) / 86400000) + 1;
      out.textContent = `(${rawDays}일)`;
      if (totals[type] !== undefined) totals[type] += rawDays;
    });

    // 배지 업데이트
    Object.keys(totals).forEach(type => {
      const el = document.getElementById('d-' + type);
      if (!el) return;
      const v = totals[type];
      if (v === 0) {
        el.textContent = '';
      } else {
        el.textContent = v % 1 === 0 ? v : v.toFixed(1);
      }
    });
  }

  function resetForm() {
    if (!confirm('작성 내용을 초기화할까요?\n(저장된 이름·팀·직위·연락처는 유지됩니다)')) return;
    document.getElementById('reason').value = '개인사정';
    document.getElementById('periodList').innerHTML = '';
    addPeriod();
    document.getElementById('displayDate').textContent = formatKorDate(new Date());
  }

  /* 초기화 */
  loadSaved();
  addPeriod();          // 첫 기간 줄 자동 생성
</script>
</body>
</html>

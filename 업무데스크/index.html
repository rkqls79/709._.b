<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 업무데스크</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#ffffff; --surface:#f9fafb; --surface2:#f3f4f6;
  --border:#e5e7eb; --border2:#d1d5db;
  --text:#111827; --text2:#6b7280; --accent:#374151;
  --urgent:#e53935; --soon:#f57c00;
  --radius:12px;
}

body {
  background:var(--bg); color:var(--text);
  font-family:'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;
  overflow-y:auto;
  display:flex; flex-direction:column;
  transition:background .3s, color .3s;
}

/* ── 헤더 ── */
.header {
  height:50px; flex-shrink:0;
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; z-index:200;
}
.header-left { display:flex; align-items:center; gap:8px; }
.header-emoji { font-size:19px; }
.header-title { font-size:19px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
.header-date { font-size:11px; color:var(--text2); margin-left:2px; }

/* ── 팔레트 ── */
.palette-wrap { position:relative; }
.palette-btn {
  width:36px; height:36px; border-radius:9px;
  background:#ffffff; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:17px; user-select:none;
  transition:background .15s;
}
.palette-btn:hover { background:#f3f4f6; }
.theme-popup {
  position:absolute; top:42px; right:0;
  background:var(--bg); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px;
  box-shadow:0 8px 24px rgba(0,0,0,.10);
  display:none; z-index:300; min-width:210px;
}
.theme-popup.open { display:block; }
.theme-popup-title { font-size:11px; color:var(--text2); font-weight:600; letter-spacing:.6px; margin-bottom:12px; }
.theme-dots { display:flex; gap:10px; flex-wrap:wrap; }
.theme-dot { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; }
.theme-dot-circle { width:28px; height:28px; border-radius:50%; border:2px solid transparent; transition:transform .15s, border-color .15s; position:relative; }
.theme-dot:hover .theme-dot-circle { transform:scale(1.15); }
.theme-dot.active .theme-dot-circle { border-color:var(--accent); }
.theme-dot.active .theme-dot-circle::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--accent); font-weight:700; }
.theme-dot-label { font-size:10px; color:var(--text2); white-space:nowrap; }

/* ── 인포바 (D 스타일: 구분선형) ── */
.info-bar {
  flex-shrink:0;
  display:flex; align-items:stretch;
  background:var(--bg); border:1px solid var(--border);
  border-radius:10px; overflow:hidden;
  height:54px; margin-bottom:10px;
}
.info-cell {
  flex:0 0 auto; display:flex; flex-direction:column; justify-content:center; gap:2px;
  padding:0 18px; border-right:1px solid var(--border);
}
.info-cell:last-child { border-right:none; }
#dday-container .info-cell:last-child { border-right:1px solid var(--border); }
#dday-container { justify-content:flex-start; }
#dday-container .info-cell { min-width:130px; }
.info-cell.comp-mini { flex:0 0 auto; padding:0 14px; min-width:90px; }
.comp-mini-bar-wrap { width:48px; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; margin-top:2px; }
.comp-mini-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; width:0%; }
.info-cell.weather { flex-direction:row; align-items:center; gap:8px; flex:0 0 auto; padding:0 16px; }
.info-cell.pomo { flex-direction:row; align-items:center; gap:10px; flex:0 0 auto; padding:0 16px; }
.ic-top { display:flex; align-items:center; gap:5px; }
.ic-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.ic-name { font-size:11px; color:var(--text2); font-weight:600; }
.ic-dd { font-size:17px; font-weight:700; line-height:1; }
.ic-sub { font-size:9px; color:var(--text2); opacity:.7; }
.w-icon { width:36px; height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.w-temp { font-size:17px; font-weight:700; color:var(--text); line-height:1; }
.w-desc { font-size:9px; color:var(--text2); }
.pomo-label { font-size:9px; color:var(--text2); font-weight:600; letter-spacing:.5px; }
.pomo-time { font-size:17px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; line-height:1; }
.pomo-mode-txt { font-size:9px; color:var(--text2); }
.pomo-btn {
  width:26px; height:26px; border-radius:6px;
  background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:11px; transition:background .15s; flex-shrink:0;
}
.pomo-btn:hover { background:var(--surface2); }

/* ── 3단 레이아웃 ── */
.layout {
  height:calc(100vh - 51px); flex-shrink:0;
  display:grid;
  grid-template-columns:68px 1fr 68px;
  gap:12px;
  padding:12px;
}

/* ── 사이드바 ── */
.sidebar {
  display:flex; flex-direction:column;
  align-items:center; gap:5px;
  padding:2px 0; overflow-y:auto; scrollbar-width:none;
}
.sidebar::-webkit-scrollbar { display:none; }
.sidebar-label { font-size:9px; color:var(--text2); font-weight:600; letter-spacing:.5px; margin-bottom:4px; text-transform:uppercase; }
.sidebar-divider { width:32px; height:1px; background:var(--border); margin:4px 0; }

.shortcut {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  text-decoration:none; cursor:pointer; transition:transform .15s; width:100%;
}
.shortcut:hover { transform:scale(1.07); }
.shortcut-icon {
  width:46px; height:46px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--border);
  overflow:hidden; transition:border-color .15s, background .15s;
}
.shortcut:hover .shortcut-icon { background:var(--surface2); border-color:var(--border2); }
.shortcut-label { font-size:9px; color:var(--text2); text-align:center; line-height:1.3; word-break:keep-all; }

/* ── 메인 ── */
.main-area { display:flex; flex-direction:column; min-height:0; }
.center-panels { display:flex; gap:10px; flex:1; min-height:0; }

/* ── 신고 마감 업무 스트립 ── */
.filing-strip {
  flex-shrink:0; height:190px; margin-top:10px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
  display:flex; flex-direction:column;
}
.fc-tasks { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.filing-strip-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 12px; border-bottom:1px solid var(--border);
  background:var(--bg); flex-shrink:0;
  font-size:12px; font-weight:700; color:var(--text);
}
.filing-strip-hd span:last-child { font-size:10px; font-weight:400; color:var(--text2); opacity:.6; }
.filing-card { flex:0 0 auto; width:210px; background:var(--bg); border:1px solid var(--border); border-radius:10px; display:flex; flex-direction:column; overflow:hidden; max-height:165px; }
.fc-accent { height:3px; flex-shrink:0; }
.fc-inner { padding:8px 11px; display:flex; flex-direction:column; flex:1; overflow:hidden; }
.fc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; flex-shrink:0; }
.fc-name { font-size:13px; font-weight:700; color:var(--text); }
.fc-dday { font-size:10px; font-weight:600; padding:2px 7px; border-radius:5px; background:var(--surface2); color:var(--text2); }
.fc-dday.urgent { background:rgba(192,80,80,.12); color:var(--urgent); }
.fc-dday.soon   { background:rgba(200,128,48,.12); color:var(--soon);   }
.fc-tasks { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.fc-task { display:flex; align-items:center; gap:7px; padding:2.5px 0; }
.fc-task-del { background:none; border:none; color:var(--text2); opacity:0; font-size:10px; cursor:pointer; margin-left:auto; padding:0 2px; flex-shrink:0; transition:opacity .15s; }
.fc-task:hover .fc-task-del { opacity:.45; }
.fc-task-del:hover { opacity:1 !important; color:var(--urgent); }
.fc-del-card { background:none; border:none; color:var(--text2); opacity:.4; font-size:10px; cursor:pointer; padding:0 2px; transition:opacity .15s; }
.fc-del-card:hover { opacity:1; color:var(--urgent); }
.fc-cb { width:14px; height:14px; border-radius:4px; border:1.5px solid var(--border2); cursor:pointer; flex-shrink:0; appearance:none; background:var(--bg); margin-top:1px; transition:background .15s, border-color .15s; }
.fc-cb:checked { background:var(--accent); border-color:var(--accent); }
.fc-task-txt { font-size:11.5px; color:var(--text); line-height:1.4; cursor:pointer; user-select:none; }
.fc-task.done .fc-task-txt { text-decoration:line-through; color:var(--text2); opacity:.5; }
.fc-progress { margin-top:8px; padding-top:7px; border-top:1px solid var(--border); flex-shrink:0; }
.fc-prog-row { display:flex; justify-content:space-between; font-size:10px; color:var(--text2); margin-bottom:4px; }
.fc-prog-bar { height:4px; background:var(--surface2); border-radius:3px; }
.fc-prog-fill { height:100%; border-radius:3px; transition:width .3s; }

/* ── 우측 패널 위아래 분할 ── */
.split-panel { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
.split-half { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.split-divider { height:1px; background:var(--border); flex-shrink:0; }

/* ── ID 메모 패널 ── */
.id-memo-area {
  flex:1; resize:none; border:none; outline:none;
  background:transparent; color:var(--text);
  font-size:12px; font-family:'Apple SD Gothic Neo','Pretendard','Noto Sans KR',monospace;
  line-height:1.9; padding:10px 12px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.id-memo-area::-webkit-scrollbar { width:4px; }
.id-memo-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.id-memo-area::placeholder { color:var(--text2); opacity:.45; }
.sub-panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 12px; border-bottom:1px solid var(--border);
  background:var(--bg); flex-shrink:0;
  font-size:11px; font-weight:600; color:var(--text2); letter-spacing:.3px;
}
.sub-panel-header span { display:flex; align-items:center; gap:5px; }

/* ── 메모 스티커 노트 (아코디언) ── */
.memo-notes-scroll {
  flex:1; overflow-y:auto; padding:8px;
  display:flex; flex-direction:column; gap:6px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.memo-notes-scroll::-webkit-scrollbar { width:4px; }
.memo-notes-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.memo-note {
  background:#FFFEF8; border:1px solid #e8e2c0;
  border-left:3px solid #F4E070;
  border-radius:7px; overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  flex-shrink:0;
}
body[data-theme="dark"] .memo-note { background:#2a2a38; border-color:#44445a; border-left-color:#7070a0; }
.memo-note-toolbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 8px; background:rgba(0,0,0,.03);
  cursor:pointer; user-select:none;
  transition:background .12s;
}
.memo-note-toolbar:hover { background:rgba(0,0,0,.06); }
.memo-note-toolbar-left { display:flex; align-items:center; gap:6px; }
.memo-note-num {
  font-size:9px; color:var(--text2); font-weight:600; letter-spacing:.5px;
  background:none; border:none; outline:none; font-family:inherit;
  cursor:text; padding:0; min-width:30px; max-width:90px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.memo-note-num:focus { color:var(--text); border-bottom:1px solid var(--border2); }
.memo-note-preview {
  font-size:10px; color:var(--text2); opacity:.7;
  max-width:100px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.memo-note-toolbar-right { display:flex; align-items:center; gap:4px; }
.memo-note-chevron {
  font-size:10px; color:var(--text2); opacity:.6;
  transition:transform .2s; line-height:1;
}
.memo-note-chevron.open { transform:rotate(180deg); }
.memo-note-del {
  background:none; border:none; color:var(--text2); cursor:pointer;
  font-size:11px; padding:0 2px; opacity:.35; transition:opacity .12s; line-height:1;
}
.memo-note-del:hover { opacity:1; color:var(--urgent); }
.memo-note-body {
  max-height:0; overflow:hidden;
  transition:max-height .22s ease;
  border-top:1px solid transparent;
}
.memo-note-body.open {
  max-height:200px;
  border-top-color:rgba(0,0,0,.06);
}
.memo-note-area {
  width:100%; resize:none; border:none; overflow:hidden;
  background:transparent; color:var(--text);
  font-size:12px; font-family:inherit; line-height:1.65;
  padding:7px 10px 8px; outline:none; min-height:52px;
}
.memo-note-area::placeholder { color:var(--text2); opacity:.45; }
.memo-add-btn-top {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--text2); font-size:10px; cursor:pointer;
  padding:2px 8px; transition:background .15s;
}
.memo-add-btn-top:hover { background:var(--surface2); color:var(--text); }
.memo-search {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:5px; color:var(--text); font-size:10px;
  padding:2px 8px; outline:none; width:90px; transition:border-color .15s, width .2s;
}
.memo-search:focus { border-color:var(--border2); width:120px; }
.memo-search::placeholder { color:var(--text2); opacity:.5; }
.memo-style-btn {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--text2); font-size:9px; cursor:pointer;
  padding:2px 7px; transition:background .15s; letter-spacing:.3px; font-weight:600;
}
.memo-style-btn:hover { background:var(--surface2); color:var(--text); }
/* 메모 스타일 1: 체크리스트 */
.memo-check-list { padding:6px 10px 4px; display:flex; flex-direction:column; gap:4px; }
.memo-check-item { display:flex; align-items:flex-start; gap:7px; font-size:12px; color:var(--text); line-height:1.5; cursor:pointer; }
.memo-check-item input[type=checkbox] {
  width:13px; height:13px; margin-top:2px; flex-shrink:0;
  accent-color:var(--accent); cursor:pointer;
}
.memo-check-item span { font-size:12px; color:var(--text); line-height:1.5; }
.memo-check-item.checked span { text-decoration:line-through; color:var(--text2); opacity:.55; }
/* 메모 스타일 2: 불릿 점 */
.memo-dot-list { padding:6px 10px 4px; display:flex; flex-direction:column; gap:4px; }
.memo-dot-item { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--text); line-height:1.5; }
.memo-dot-item::before { content:'·'; color:var(--text2); font-size:16px; line-height:1.1; flex-shrink:0; }
/* 항목 삭제 버튼 */
.memo-item-del { background:none; border:none; color:var(--text2); opacity:0; font-size:10px; cursor:pointer; padding:0 2px; margin-left:auto; flex-shrink:0; line-height:1.5; transition:opacity .15s; }
.memo-check-item:hover .memo-item-del,
.memo-dot-item:hover .memo-item-del { opacity:.5; }
.memo-item-del:hover { opacity:1 !important; color:var(--urgent); }
/* 편집 버튼 */
.memo-edit-toggle {
  display:flex; justify-content:flex-end; padding:2px 10px 6px;
}
.memo-edit-toggle button {
  background:none; border:none; font-size:10px; color:var(--text2);
  cursor:pointer; opacity:.55; transition:opacity .12s; padding:0;
}
.memo-edit-toggle button:hover { opacity:1; }

/* ── 체크리스트 ── */
.todo-body { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.todo-list { flex:1; overflow-y:auto; padding:4px 6px; list-style:none; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.todo-list::-webkit-scrollbar { width:4px; }
.todo-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.todo-item { display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border-radius:7px; transition:background .12s; cursor:default; }
.todo-item:hover { background:var(--surface2); }
.todo-cb { width:15px; height:15px; border-radius:4px; border:1.5px solid var(--border2); cursor:pointer; flex-shrink:0; appearance:none; background:var(--bg); margin-top:1px; transition:background .15s, border-color .15s; }
.todo-cb:checked { background:var(--accent); border-color:var(--accent); }
.todo-txt { flex:1; font-size:12px; color:var(--text); line-height:1.5; word-break:break-all; }
.todo-done .todo-txt { text-decoration:line-through; color:var(--text2); opacity:.55; }
.todo-del { font-size:13px; color:var(--text2); cursor:pointer; opacity:0; transition:opacity .12s; flex-shrink:0; line-height:1; padding-top:1px; }
.todo-item:hover .todo-del { opacity:.6; }
.todo-del:hover { opacity:1 !important; }
.todo-footer { border-top:1px solid var(--border); padding:8px 10px; display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
.todo-input-row { display:flex; gap:6px; }
.todo-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:5px 10px; font-size:12px; color:var(--text); outline:none; font-family:inherit; transition:border-color .15s; }
.todo-input::placeholder { color:var(--text2); opacity:.6; }
.todo-input:focus { border-color:var(--accent); }
.todo-add-btn { background:var(--accent); color:var(--bg); border:none; border-radius:7px; padding:5px 12px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity .15s; flex-shrink:0; }
.todo-add-btn:hover { opacity:.8; }
.todo-glink { display:flex; align-items:center; justify-content:center; gap:5px; font-size:10px; color:var(--text2); text-decoration:none; padding:2px 0; transition:color .15s; }
.todo-glink:hover { color:var(--accent); }
.todo-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:20px; }
.todo-empty-icon { font-size:24px; opacity:.3; }
.todo-empty-txt { font-size:11px; color:var(--text2); text-align:center; line-height:1.6; opacity:.7; }

/* ── 아래 섹션 ── */
.below-section {
  display:flex; gap:14px; padding:16px 12px 20px;
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-wrap:wrap;
}
.bs-col-left  { flex:2.4; min-width:300px; }
.bs-col-right { flex:1;   min-width:200px; max-width:260px; }
.bs-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.bs-card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; border-bottom:1px solid var(--border); background:var(--bg);
}
.bs-card-title { font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px; }
.bs-card-sub { font-size:10px; color:var(--text2); }
.filing-row { display:flex; gap:8px; padding:8px 10px; flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; flex:1; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.completion-inner { padding:20px 16px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.comp-ring-wrap { position:relative; width:96px; height:96px; }
.comp-ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.comp-pct { font-size:22px; font-weight:700; color:var(--text); line-height:1; }
.comp-label { font-size:9px; color:var(--text2); letter-spacing:.5px; }
.comp-stat { font-size:12px; color:var(--text2); text-align:center; }
.comp-stat strong { color:var(--text); font-weight:700; }
.panel {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
  display:flex; flex-direction:column; min-height:0;
}
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; border-bottom:1px solid var(--border);
  background:var(--bg); flex-shrink:0;
}
.panel-title { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--text); }

function dateKey(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function adjustDeadline(d) {
  const dt = new Date(d);
  let guard = 14;
  while (guard-- > 0) {
    const dow = dt.getDay();
    if (dow === 6) { dt.setDate(dt.getDate()+2); continue; } // 토→월
    if (dow === 0) { dt.setDate(dt.getDate()+1); continue; } // 일→월
    if (KR_HOLIDAYS.has(dateKey(dt))) { dt.setDate(dt.getDate()+1); continue; } // 공휴일→다음날
    break;
  }
  return dt;
}

const POMO_WORK  = 25 * 60;
const POMO_BREAK =  5 * 60;
let pomoTotal = POMO_WORK, pomoLeft = POMO_WORK;
let pomoRunning = false, pomoInterval = null, pomoIsWork = true;
const circumference = 2 * Math.PI * 17;

function pomoRender() {
  const m = String(Math.floor(pomoLeft / 60)).padStart(2,'0');
  const s = String(pomoLeft % 60).padStart(2,'0');
  document.getElementById('pomo-time').textContent = `${m}:${s}`;
  const progress = pomoLeft / pomoTotal;
  const pomoRing = document.getElementById('pomo-progress');
  if (pomoRing) { pomoRing.style.strokeDashoffset = circumference * (1 - progress); pomoRing.style.stroke = pomoIsWork ? '#e53935' : '#43a047'; }
  document.getElementById('pomo-mode').textContent = pomoIsWork ? '집중 시간' : '휴식 시간';
  document.getElementById('pomo-play').textContent = pomoRunning ? '⏸' : '▶';
  document.getElementById('pomo-label').textContent = pomoIsWork ? 'FOCUS' : 'BREAK';
}
function pomoToggle() {
  if (pomoRunning) {
    clearInterval(pomoInterval); pomoRunning = false;
  } else {
    pomoRunning = true;
    pomoInterval = setInterval(() => {
      pomoLeft--;
      if (pomoLeft <= 0) {
        clearInterval(pomoInterval); pomoRunning = false;
        pomoIsWork = !pomoIsWork;
        pomoTotal = pomoLeft = pomoIsWork ? POMO_WORK : POMO_BREAK;
        new Notification && Notification.requestPermission();
      }
      pomoRender();
    }, 1000);
  }
  pomoRender();
}
function pomoReset() {
  clearInterval(pomoInterval); pomoRunning = false;
  pomoIsWork = true; pomoTotal = pomoLeft = POMO_WORK;
  pomoRender();
}
pomoRender();

let todos = JSON.parse(localStorage.getItem('dash-todos') || '[]');

function renderTodos() {
  const list = document.getElementById('todo-list');
  const empty = document.getElementById('todo-empty');
  const items = todos;
  // clear except empty placeholder
  Array.from(list.children).forEach(c => { if (c !== empty) c.remove(); });
  if (items.length === 0) {
    empty.style.display = 'flex';
  } else {
    empty.style.display = 'none';
    items.forEach((t, i) => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.done ? ' todo-done' : '');
      li.dataset.i = i;
      li.innerHTML = `
        <input type="checkbox" class="todo-cb" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
        <span class="todo-txt">${escHtml(t.text)}</span>
        <span class="todo-del" onclick="deleteTodo(${i})" title="삭제">✕</span>`;
      list.appendChild(li);

  }
  const done = todos.filter(t => t.done).length;
  document.getElementById('todo-count').textContent = todos.length ? `${done}/${todos.length}` : '';

  const inp = document.getElementById('todo-input');
  const txt = inp.value.trim();

  todos.unshift({ text: txt, done: false, id: Date.now() });
  saveTodos(); renderTodos();
  inp.value = '';
}
function toggleTodo(i) {
  todos[i].done = !todos[i].done;

function deleteTodo(i) {
  todos.splice(i, 1);

  const old = localStorage.getItem('dash-memo');
  if (old && old.trim()) { memoNotes = [{id:Date.now(), name:'MEMO 1', text:old.trim(), checks:[]}]; saveMemoNotes(); }
}
function saveMemoNotes() { localStorage.setItem('dash-memos', JSON.stringify(memoNotes)); }
function saveMemoOpenStates() { localStorage.setItem('dash-memos-open', JSON.stringify(memoOpenStates)); }
function toggleMemoOpen(i) {
  while (memoOpenStates.length <= i) memoOpenStates.push(false);
  memoOpenStates[i] = !memoOpenStates[i];
  saveMemoOpenStates();
  renderMemoNotes();
}

function renderMemoNotes() {
  const container = document.getElementById('memo-notes');
  if (!container) return;
  container.innerHTML = '';
  if (memoNotes.length === 0) {
    container.innerHTML = '<div style="padding:14px 10px; font-size:11px; color:var(--text2); opacity:.6; text-align:center;">+ 추가 버튼으로 메모를 작성해보세요</div>';
    return;
  }
  const q = memoSearchQuery;
  let visible = memoNotes.map((note, ni) => ({ note, ni }));
  if (q) {
    visible = visible.filter(({ note }) =>
      (note.name || '').toLowerCase().includes(q) || note.text.toLowerCase().includes(q)
    );
  }
  if (visible.length === 0) {
    container.innerHTML = '<div style="padding:14px 10px; font-size:11px; color:var(--text2); opacity:.6; text-align:center;">검색 결과가 없어요</div>';
    return;
  }
  visible.forEach(({ note, ni }) => {
    while (memoOpenStates.length <= ni) memoOpenStates.push(ni === 0);
    const isOpen = q ? true : memoOpenStates[ni];
    const noteStyle = note.style || '4';
    const preview = note.text.split('\n')[0].trim() || '';
    const lines = note.text.split('\n').filter(l => l.trim());

    const div = document.createElement('div');
    div.className = 'memo-note';

    // toolbar
    const toolbar = document.createElement('div');
    toolbar.className = 'memo-note-toolbar';
    toolbar.innerHTML = `
      <div class="memo-note-toolbar-left">
        <input class="memo-note-num" value="${escHtml(note.name || 'MEMO '+(ni+1))}" maxlength="20" title="클릭하여 이름 수정">
      </div>
      <div class="memo-note-toolbar-right">
        <button class="memo-style-btn" title="스타일 전환 (${MEMO_STYLE_TITLES[noteStyle]})">${MEMO_STYLE_LABELS[noteStyle]}</button>
        <span class="memo-note-chevron ${isOpen ? 'open' : ''}">▼</span>
        <button class="memo-note-del" title="삭제">✕</button>
      </div>`;
    const nameInput = toolbar.querySelector('.memo-note-num');
    nameInput.addEventListener('click', e => e.stopPropagation());
    nameInput.addEventListener('input', () => { memoNotes[ni].name = nameInput.value; saveMemoNotes(); });
    toolbar.querySelector('.memo-style-btn').addEventListener('click', e => { e.stopPropagation(); cycleMemoNoteStyle(ni); });
    toolbar.querySelector('.memo-note-del').addEventListener('click', e => { e.stopPropagation(); deleteMemoNote(ni); });
    toolbar.addEventListener('click', () => toggleMemoOpen(ni));

    // body
    const body = document.createElement('div');
    body.className = 'memo-note-body' + (isOpen ? ' open' : '');

    if (noteStyle === '4') {
      // 자유텍스트: 항상 textarea
      const ta = document.createElement('textarea');
      ta.className = 'memo-note-area';
      ta.placeholder = 'ID, 비밀번호, 참고 번호, 업무 메모 등...';
      ta.value = note.text;
      ta.addEventListener('click', e => e.stopPropagation());
      ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        memoNotes[ni].text = this.value;
        memoNotes[ni].checks = [];
        saveMemoNotes();
      });
      body.appendChild(ta);
      setTimeout(() => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }, 0);

    } else {
      // 체크리스트 / 점: 항목 직접 편집 (모드 전환 없음)
      if (!note.checks) note.checks = [];
      while (note.checks.length < lines.length) note.checks.push(false);

      const listEl = document.createElement('div');
      listEl.className = noteStyle === '1' ? 'memo-check-list' : 'memo-dot-list';
      listEl.addEventListener('click', e => e.stopPropagation());

      const saveLines = () => { note.text = lines.join('\n'); saveMemoNotes(); };

      const focusItem = (idx) => setTimeout(() => {
        const spans = div.querySelectorAll('[contenteditable]');
        if (spans[idx]) { spans[idx].focus(); placeCursorAtEnd(spans[idx]); }
      }, 20);

      lines.forEach((line, li) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = noteStyle === '1'
          ? ('memo-check-item' + (note.checks[li] ? ' checked' : ''))
          : 'memo-dot-item';

        if (noteStyle === '1') {
          const cb = document.createElement('input');
          cb.type = 'checkbox'; cb.checked = !!note.checks[li];
          cb.addEventListener('click', e => e.stopPropagation());
          cb.addEventListener('change', () => {
            note.checks[li] = cb.checked;
            saveMemoNotes();
            itemDiv.classList.toggle('checked', cb.checked);
          });
          itemDiv.appendChild(cb);
        }

        const span = document.createElement('span');
        span.contentEditable = true;
        span.textContent = line;
        span.style.cssText = 'outline:none; min-width:4px; flex:1;';
        span.addEventListener('click', e => e.stopPropagation());
        span.addEventListener('paste', e => {
          e.preventDefault();
          const txt = (e.clipboardData||window.clipboardData).getData('text/plain');
          document.execCommand('insertText', false, txt);
        });
        span.addEventListener('keydown', e => {
          e.stopPropagation();
          if (e.key === 'Enter') {
            e.preventDefault();
            lines[li] = span.textContent;
            lines.splice(li + 1, 0, '');
            note.checks.splice(li + 1, 0, false);
            saveLines(); renderMemoNotes(); focusItem(li + 1);
          } else if (e.key === 'Backspace' && span.textContent === '' && lines.length > 1) {
            e.preventDefault();
            lines.splice(li, 1);
            note.checks.splice(li, 1);
            saveLines(); renderMemoNotes(); focusItem(Math.max(0, li - 1));
          }
        });
        span.addEventListener('blur', () => {
          const val = span.textContent.trim();
          if (val !== lines[li]) { lines[li] = val; saveLines(); }
        });

        const delBtn = document.createElement('button');
        delBtn.className = 'memo-item-del';
        delBtn.title = '항목 삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          lines.splice(li, 1);
          note.checks.splice(li, 1);
          saveLines(); renderMemoNotes();
        });

        itemDiv.appendChild(span);
        itemDiv.appendChild(delBtn);
        listEl.appendChild(itemDiv);
      });

      // 새 항목 추가 입력창
      const addWrap = document.createElement('div');
      addWrap.style.cssText = 'padding:3px 10px 6px; display:flex; align-items:center; gap:6px;';
      if (noteStyle === '1') {
        const dot = document.createElement('span');
        dot.textContent = '+';
        dot.style.cssText = 'font-size:11px; color:var(--text2); opacity:.5; flex-shrink:0;';
        addWrap.appendChild(dot);
      }
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.placeholder = '항목 추가...';
      addInput.style.cssText = 'flex:1; background:none; border:none; outline:none; font-size:11px; color:var(--text2);';
      addInput.addEventListener('click', e => e.stopPropagation());
      addInput.addEventListener('keydown', e => {
        e.stopPropagation();
        if (e.key === 'Enter' && addInput.value.trim()) {
          lines.push(addInput.value.trim());
          note.checks.push(false);
          saveLines(); renderMemoNotes();
          setTimeout(() => {
            const noteEl = document.querySelector(`#memo-notes .memo-note:nth-child(${ni+1})`);
            if (noteEl) { const inp = noteEl.querySelector('input[type=text]'); if (inp) inp.focus(); }
          }, 20);
        } else if (e.key === 'Backspace' && addInput.value === '' && lines.length > 0) {
          e.preventDefault();
          lines.pop(); note.checks.pop();
          saveLines(); renderMemoNotes();
          setTimeout(() => {
            const noteEl = document.querySelector(`#memo-notes .memo-note:nth-child(${ni+1})`);
            if (noteEl) { const inp = noteEl.querySelector('input[type=text]'); if (inp) inp.focus(); }
          }, 20);
        }
      });
      addWrap.appendChild(addInput);
      listEl.appendChild(addWrap);
      body.appendChild(listEl);
    }

    div.appendChild(toolbar);
    div.appendChild(body);
    container.appendChild(div);
  });
}

function placeCursorAtEnd(el) {
  const range = document.createRange();
  const sel = window.getSelection();
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

function addMemoNote() {
  memoNotes.push({id:Date.now(), name:`MEMO ${memoNotes.length+1}`, text:'', checks:[]});
  while (memoOpenStates.length < memoNotes.length) memoOpenStates.push(false);
  memoOpenStates[memoNotes.length - 1] = true;
  saveMemoNotes(); saveMemoOpenStates(); renderMemoNotes();
  setTimeout(() => { const c = document.getElementById('memo-notes'); if (c) c.scrollTop = c.scrollHeight; }, 50);
}
function deleteMemoNote(i) {
  memoNotes.splice(i, 1);
  memoOpenStates.splice(i, 1);
  delete memoEditStates[i];
  saveMemoNotes(); saveMemoOpenStates(); renderMemoNotes();
}
renderMemoNotes();

/* ── 신고 마감 업무 체크리스트 ── */
const FILING_TASKS_MAP = {
  '원천세':       ['인건비 자료 요청','원천세 전자신고','원천세 납부서 전달','전자신고 구글 업로드'],
  '부가세':       ['자료 요청','부가세 전자신고','부가세 납부서 전달','전자신고 구글 업로드'],
  '간이지급명세서': ['간이지급명세서 전자신고','전자신고 구글 업로드'],
  '종합소득세':   ['소득 자료 수집 및 검토','소득·세액공제 증빙 서류 확인','종합소득세 신고서 작성 및 검토','홈택스 전자신고 제출','세액 납부 (분납 여부 확인)'],
  '법인세':       ['재무제표 확정 및 검토','세무조정 계산서 작성','법인세 신고서 작성 및 검토','홈택스 전자신고 제출','법인세액 납부 처리'],
};
const FILING_COLORS = {
  '원천세':'rgba(210,198,148,0.6)','부가세':'rgba(205,168,170,0.6)',
  '간이지급명세서':'rgba(160,200,180,0.6)',
  '종합소득세':'rgba(182,174,212,0.6)','법인세':'rgba(155,185,208,0.6)'
};
const ddDeadlines = { '원천세':wtNext, '부가세':vatNext, '간이지급명세서':gjDate, '종합소득세':itDate, '법인세':ctDate };

function filingKey(name) {
  const d = ddDeadlines[name]; if (!d) return `filing-${name}`;
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `filing-${name}-${y}${m}${day}`;
}

/* ── 커스텀 신고 카드 ── */
const CUSTOM_CARDS_KEY = 'custom-filing-cards';
function loadCustomCards() { return JSON.parse(localStorage.getItem(CUSTOM_CARDS_KEY) || '[]'); }
function saveCustomCards(arr) { localStorage.setItem(CUSTOM_CARDS_KEY, JSON.stringify(arr)); }

function openAddFiling() { document.getElementById('add-filing-form').style.display = 'block'; document.getElementById('af-name').focus(); }
function closeAddFiling() { document.getElementById('add-filing-form').style.display = 'none'; document.getElementById('af-name').value=''; document.getElementById('af-date').value=''; document.getElementById('af-tasks').value=''; }
function submitAddFiling() {
  const name = document.getElementById('af-name').value.trim();
  const date = document.getElementById('af-date').value;
  const tasks = document.getElementById('af-tasks').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if (!name || !date) return;
  const cards = loadCustomCards();
  cards.push({ id: Date.now(), name, date, tasks, checks: tasks.map(()=>false) });
  saveCustomCards(cards);
  closeAddFiling();
  renderFilingCards();
}

function buildFilingCard(container, name, ddLabel, ddClass, dateStr, tasks, checks, accentColor, onCheck, onDelete, onTaskEdit, onTaskAdd) {
  const card = document.createElement('div');
  card.className = 'filing-card';
  card.dataset.filingName = name;
  card.innerHTML = `
    <div class="fc-accent" style="background:${accentColor};"></div>
    <div class="fc-inner">
      <div class="fc-header">
        <div class="fc-name">${name}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="fc-dday ${ddClass}">${ddLabel} · ${dateStr}</div>
          ${onDelete ? `<button class="fc-del-card" title="카드 삭제">✕</button>` : ''}
        </div>
      </div>
      <div class="fc-tasks"></div>
    </div>`;
  if (onDelete) card.querySelector('.fc-del-card').addEventListener('click', onDelete);
  const tasksEl = card.querySelector('.fc-tasks');
  tasks.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'fc-task' + (checks[i] ? ' done' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'fc-cb'; cb.checked = !!checks[i];
    cb.addEventListener('change', () => { onCheck(i, cb.checked); row.classList.toggle('done', cb.checked); });
    const span = document.createElement('span');
    span.className = 'fc-task-txt';
    span.contentEditable = true;
    span.textContent = t;
    span.style.outline = 'none';
    span.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = span.textContent.trim();
        if (val !== tasks[i] && onTaskEdit) onTaskEdit(i, val);
        if (onTaskAdd) onTaskAdd(i, val);
      }
    });
    span.addEventListener('blur', () => {
      const val = span.textContent.trim();
      if (!val) { span.textContent = t; return; }
      if (val !== tasks[i] && onTaskEdit) onTaskEdit(i, val);
    });
    row.appendChild(cb); row.appendChild(span);
    tasksEl.appendChild(row);
  });
  container.appendChild(card);
}

function focusFilingTask(name, idx) {
  setTimeout(() => {
    const card = document.querySelector(`.filing-card[data-filing-name="${name}"]`);
    if (card) { const spans = card.querySelectorAll('.fc-task-txt'); if (spans[idx]) { spans[idx].focus(); placeCursorAtEnd(spans[idx]); } }
  }, 20);
}

function renderFilingCards() {
  const container = document.getElementById('filing-row');
  if (!container) return;
  container.innerHTML = '';

  // 기본 신고 카드
  ddItems.forEach(item => {
    const baseTasks = FILING_TASKS_MAP[item.name] || [];
    const key = filingKey(item.name);
    const saved = JSON.parse(localStorage.getItem(key) || '[]');
    const namesKey = key + '-names';
    let savedNames = (() => {
      try {
        const v = JSON.parse(localStorage.getItem(namesKey) || '[]');
        return Array.isArray(v) ? v : [];
      } catch(e) { return []; }
    })();
    // savedNames가 완전히 비어있거나 전부 falsy면 자동 초기화
    if (savedNames.length > 0 && savedNames.every(s => !s)) {
      savedNames = [];
      localStorage.removeItem(namesKey);
    }
    // 기본 + 추가 항목 합산
    const maxLen = Math.max(baseTasks.length, savedNames.length);
    const tasks = Array.from({length: maxLen}, (_, i) => {
      const sn = typeof savedNames[i] === 'string' && savedNames[i].trim() ? savedNames[i] : null;
      return sn ?? baseTasks[i] ?? '';
    }).filter((t, i) => t || i < baseTasks.length);
    while (saved.length < tasks.length) saved.push(false);
    const ddClass = item.diff <= 7 ? 'urgent' : item.diff <= 30 ? 'soon' : '';
    const ddLabel = item.diff === 0 ? 'D-DAY' : `D-${item.diff}`;
    const accentColor = FILING_COLORS[item.name] || '#9ab0c8';
    buildFilingCard(container, item.name, ddLabel, ddClass, item.date, tasks, saved, accentColor,
      (i, checked) => { saved[i] = checked; localStorage.setItem(key, JSON.stringify(saved)); },
      null,
      (i, val) => { savedNames[i] = val; localStorage.setItem(namesKey, JSON.stringify(savedNames)); },
      (i, val) => {
        // 기존 업무명 전체를 savedNames에 보존 후 splice
        tasks.forEach((t, idx) => { if (!savedNames[idx]) savedNames[idx] = t; });
        if (val) savedNames[i] = val;
        savedNames.splice(i + 1, 0, '');
        saved.splice(i + 1, 0, false);
        localStorage.setItem(key, JSON.stringify(saved));
        localStorage.setItem(namesKey, JSON.stringify(savedNames));
        renderFilingCards();
        focusFilingTask(item.name, i + 1);
      }
    );
  });

  // 커스텀 신고 카드
  const customCards = loadCustomCards();
  customCards.forEach((cc, ci) => {
    const today = new Date(); today.setHours(0,0,0,0);
    const deadline = new Date(cc.date);
    const diff = Math.ceil((deadline - today) / 86400000);
    const ddClass = diff <= 7 ? 'urgent' : diff <= 30 ? 'soon' : '';
    const ddLabel = diff === 0 ? 'D-DAY' : diff < 0 ? `D+${Math.abs(diff)}` : `D-${diff}`;
    const dateStr = cc.date.replace(/-/g, '.');
    const accentColor = '#9ab0c8';
    buildFilingCard(container, cc.name, ddLabel, ddClass, dateStr, cc.tasks, cc.checks, accentColor,
      (i, checked) => { customCards[ci].checks[i] = checked; saveCustomCards(customCards); },
      () => { if (confirm(`"${cc.name}" 카드를 삭제할까요?`)) { customCards.splice(ci,1); saveCustomCards(customCards); renderFilingCards(); } },
      (i, val) => { customCards[ci].tasks[i] = val; saveCustomCards(customCards); },
      (i, val) => {
        customCards[ci].tasks[i] = val;
        customCards[ci].tasks.splice(i + 1, 0, '');
        customCards[ci].checks.splice(i + 1, 0, false);
        saveCustomCards(customCards);
        renderFilingCards();
        focusFilingTask(cc.name, i + 1);
      }
    );
  });
}
renderFilingCards();

/* ── 할일 완료율 (인포바 미니) ── */
function updateCompletion() {
  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const pctEl = document.getElementById('comp-mini-pct');
  const bar   = document.getElementById('comp-mini-bar');
  if (pctEl) pctEl.textContent = total > 0 ? `${done}/${total}` : '—';
  if (bar)   bar.style.width = pct + '%';
}
updateCompletion();
